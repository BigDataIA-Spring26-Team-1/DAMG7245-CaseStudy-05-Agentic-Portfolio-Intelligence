<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PE OrgAIR Case Study 5 Architecture</title>
  <desc id="desc">Architecture diagram showing CS1 through CS4 integrations flowing into portfolio intelligence services, MCP tools, LangGraph agents, bonus deliverables, and the unified Streamlit user interface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F6F0"/>
      <stop offset="1" stop-color="#EEF3F2"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#13343B"/>
      <stop offset="1" stop-color="#1D4B53"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#12323A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L11 6L1 11V1Z" fill="#245866"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)"/>
  <rect x="44" y="36" width="1512" height="108" rx="28" fill="url(#header)"/>
  <text x="86" y="88" fill="#F7FBFC" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">PE OrgAIR Case Study 5 Architecture</text>
  <text x="86" y="122" fill="#CFE3E7" font-family="Segoe UI, Arial, sans-serif" font-size="19">Portfolio intelligence platform with integrated CS1-CS4 services, MCP tooling, LangGraph agents, unified Streamlit UI, and bonus deliverables</text>

  <text x="70" y="186" fill="#355760" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.8">INTEGRATION LAYER</text>
  <text x="70" y="438" fill="#355760" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.8">ORCHESTRATION LAYER</text>
  <text x="70" y="696" fill="#355760" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.8">EXPERIENCE AND DELIVERY</text>

  <g filter="url(#shadow)">
    <rect x="68" y="210" width="330" height="156" rx="24" fill="#E5F0FF" stroke="#A9C5F4" stroke-width="2"/>
    <text x="98" y="254" fill="#173C73" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">CS1Client</text>
    <text x="98" y="288" fill="#2E4C79" font-family="Segoe UI, Arial, sans-serif" font-size="19">Company and portfolio facade</text>
    <text x="98" y="320" fill="#40556D" font-family="Segoe UI, Arial, sans-serif" font-size="18">- company lookup and ticker resolution</text>
    <text x="98" y="346" fill="#40556D" font-family="Segoe UI, Arial, sans-serif" font-size="18">- portfolio holdings and EV metadata</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="440" y="210" width="330" height="156" rx="24" fill="#DDF5EF" stroke="#94D5C3" stroke-width="2"/>
    <text x="470" y="254" fill="#195548" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">CS2Client</text>
    <text x="470" y="288" fill="#2D5E55" font-family="Segoe UI, Arial, sans-serif" font-size="19">Evidence and external signals</text>
    <text x="470" y="320" fill="#40635B" font-family="Segoe UI, Arial, sans-serif" font-size="18">- documents, chunks, and market signals</text>
    <text x="470" y="346" fill="#40635B" font-family="Segoe UI, Arial, sans-serif" font-size="18">- retrieval inputs for justification</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="812" y="210" width="330" height="156" rx="24" fill="#FFF1D8" stroke="#E6C481" stroke-width="2"/>
    <text x="842" y="254" fill="#7A4B0A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">CS3Client</text>
    <text x="842" y="288" fill="#6D572F" font-family="Segoe UI, Arial, sans-serif" font-size="19">Org-AI-R scoring and rubrics</text>
    <text x="842" y="320" fill="#6B603F" font-family="Segoe UI, Arial, sans-serif" font-size="18">- dimension and aggregate scores</text>
    <text x="842" y="346" fill="#6B603F" font-family="Segoe UI, Arial, sans-serif" font-size="18">- rubric criteria and score context</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1184" y="210" width="330" height="156" rx="24" fill="#FBE6EC" stroke="#E3B8C7" stroke-width="2"/>
    <text x="1214" y="254" fill="#7C294F" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">CS4Client</text>
    <text x="1214" y="288" fill="#775065" font-family="Segoe UI, Arial, sans-serif" font-size="19">Grounded justification service</text>
    <text x="1214" y="320" fill="#775065" font-family="Segoe UI, Arial, sans-serif" font-size="18">- evidence-backed explanations</text>
    <text x="1214" y="346" fill="#775065" font-family="Segoe UI, Arial, sans-serif" font-size="18">- gap analysis and diligence support</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="104" y="468" width="340" height="168" rx="24" fill="white" stroke="#CBD8DF" stroke-width="2"/>
    <text x="134" y="512" fill="#29424A" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">PortfolioDataService</text>
    <text x="134" y="546" fill="#52666E" font-family="Segoe UI, Arial, sans-serif" font-size="18">Unifies CS1-CS4 portfolio, evidence,</text>
    <text x="134" y="572" fill="#52666E" font-family="Segoe UI, Arial, sans-serif" font-size="18">scoring, entry history, and EV weighting</text>
    <text x="134" y="598" fill="#52666E" font-family="Segoe UI, Arial, sans-serif" font-size="18">for dashboard and agent workflows</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="506" y="468" width="340" height="168" rx="24" fill="#EDF1F5" stroke="#C5D0DA" stroke-width="2"/>
    <text x="536" y="512" fill="#314A54" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">AssessmentHistoryService</text>
    <text x="536" y="546" fill="#586A73" font-family="Segoe UI, Arial, sans-serif" font-size="18">Stores point-in-time score snapshots,</text>
    <text x="536" y="572" fill="#586A73" font-family="Segoe UI, Arial, sans-serif" font-size="18">entry deltas, and trend analysis for</text>
    <text x="536" y="598" fill="#586A73" font-family="Segoe UI, Arial, sans-serif" font-size="18">portfolio monitoring and IC reporting</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="908" y="468" width="292" height="168" rx="24" fill="#E5F0FF" stroke="#A9C5F4" stroke-width="2"/>
    <text x="938" y="512" fill="#173C73" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">MCP Server</text>
    <text x="938" y="546" fill="#3A5472" font-family="Segoe UI, Arial, sans-serif" font-size="18">Tools, resources, and prompts expose</text>
    <text x="938" y="572" fill="#3A5472" font-family="Segoe UI, Arial, sans-serif" font-size="18">portfolio scoring, evidence, EBITDA,</text>
    <text x="938" y="598" fill="#3A5472" font-family="Segoe UI, Arial, sans-serif" font-size="18">gap analysis, memory, ROI, and reports</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1242" y="468" width="292" height="168" rx="24" fill="#DDF5EF" stroke="#94D5C3" stroke-width="2"/>
    <text x="1272" y="512" fill="#195548" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">LangGraph Agents</text>
    <text x="1272" y="546" fill="#3B655D" font-family="Segoe UI, Arial, sans-serif" font-size="18">Supervisor plus specialists orchestrate</text>
    <text x="1272" y="572" fill="#3B655D" font-family="Segoe UI, Arial, sans-serif" font-size="18">due diligence with HITL approval gates</text>
    <text x="1272" y="598" fill="#3B655D" font-family="Segoe UI, Arial, sans-serif" font-size="18">and MCP-backed reasoning steps</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="104" y="724" width="340" height="170" rx="24" fill="#FFF1D8" stroke="#E6C481" stroke-width="2"/>
    <text x="134" y="768" fill="#7A4B0A" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Unified Streamlit UI</text>
    <text x="134" y="802" fill="#6B603F" font-family="Segoe UI, Arial, sans-serif" font-size="18">`streamlit/app.py` is the single UI entrypoint</text>
    <text x="134" y="828" fill="#6B603F" font-family="Segoe UI, Arial, sans-serif" font-size="18">and embeds the full CS5 dashboard view</text>
    <text x="134" y="854" fill="#6B603F" font-family="Segoe UI, Arial, sans-serif" font-size="18">together with earlier case-study tooling</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="506" y="724" width="340" height="170" rx="24" fill="#FBE6EC" stroke="#E3B8C7" stroke-width="2"/>
    <text x="536" y="768" fill="#7C294F" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Bonus Services</text>
    <text x="536" y="802" fill="#775065" font-family="Segoe UI, Arial, sans-serif" font-size="18">Mem0-style memory, investment tracker,</text>
    <text x="536" y="828" fill="#775065" font-family="Segoe UI, Arial, sans-serif" font-size="18">IC memo export, and LP letter export</text>
    <text x="536" y="854" fill="#775065" font-family="Segoe UI, Arial, sans-serif" font-size="18">share the same backend and artifact store</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="908" y="724" width="292" height="170" rx="24" fill="#EDF1F5" stroke="#C5D0DA" stroke-width="2"/>
    <text x="938" y="768" fill="#314A54" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">FastAPI + Metrics</text>
    <text x="938" y="802" fill="#586A73" font-family="Segoe UI, Arial, sans-serif" font-size="18">Operational APIs, MCP HTTP endpoint,</text>
    <text x="938" y="828" fill="#586A73" font-family="Segoe UI, Arial, sans-serif" font-size="18">and Prometheus metrics back the UI,</text>
    <text x="938" y="854" fill="#586A73" font-family="Segoe UI, Arial, sans-serif" font-size="18">automation scripts, and external clients</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1242" y="724" width="292" height="170" rx="24" fill="white" stroke="#CBD8DF" stroke-width="2"/>
    <text x="1272" y="768" fill="#29424A" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Artifacts + Results</text>
    <text x="1272" y="802" fill="#52666E" font-family="Segoe UI, Arial, sans-serif" font-size="18">Scoring runs, portfolio outputs, and</text>
    <text x="1272" y="828" fill="#52666E" font-family="Segoe UI, Arial, sans-serif" font-size="18">generated documents land under</text>
    <text x="1272" y="854" fill="#52666E" font-family="Segoe UI, Arial, sans-serif" font-size="18">`results/` and `results/bonus/`</text>
  </g>

  <path d="M234 366V438" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M606 366V438" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M978 366V438" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1350 366V438" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M444 552H486" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M846 552H888" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1200 552H1222" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M274 636V704" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M676 636V704" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1054 636V704" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1388 636V704" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M1200 520C1268 520 1280 436 1350 436" stroke="#245866" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <path d="M388 768H486" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M846 768H888" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1200 768H1222" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="60" y="922" width="1480" height="24" rx="12" fill="#DCE8EA"/>
  <text x="88" y="938" fill="#365760" font-family="Segoe UI, Arial, sans-serif" font-size="16">Persistent stores: Snowflake for company, evidence, scoring, history, and portfolio tables; Redis for cache and task state; Chroma for retrieval; local results folders for generated proof artifacts and bonus exports.</text>
</svg>
