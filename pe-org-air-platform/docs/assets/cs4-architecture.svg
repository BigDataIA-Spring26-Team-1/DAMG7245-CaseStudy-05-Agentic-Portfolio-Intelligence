<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PE OrgAIR CS4 Architecture</title>
  <desc id="desc">Architecture diagram showing CS1, CS2, CS3 integrations flowing into indexing, retrieval, justification, workflows, and delivery surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F6F0"/>
      <stop offset="1" stop-color="#EEF3F2"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#13343B"/>
      <stop offset="1" stop-color="#1D4B53"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E5F0FF"/>
      <stop offset="1" stop-color="#D7E6FF"/>
    </linearGradient>
    <linearGradient id="cardTeal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DDF5EF"/>
      <stop offset="1" stop-color="#CBEDE4"/>
    </linearGradient>
    <linearGradient id="cardAmber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF1D8"/>
      <stop offset="1" stop-color="#FFE3B6"/>
    </linearGradient>
    <linearGradient id="cardRose" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FBE6EC"/>
      <stop offset="1" stop-color="#F6D7E1"/>
    </linearGradient>
    <linearGradient id="cardSlate" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EDF1F5"/>
      <stop offset="1" stop-color="#DCE4EC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#12323A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L11 6L1 11V1Z" fill="#245866"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)"/>
  <rect x="44" y="36" width="1512" height="108" rx="28" fill="url(#header)"/>
  <text x="86" y="88" fill="#F7FBFC" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">PE OrgAIR Case Study 4 Architecture</text>
  <text x="86" y="122" fill="#CFE3E7" font-family="Segoe UI, Arial, sans-serif" font-size="19">Grounded RAG workflow for retrieval, score justification, IC prep, and analyst-note indexing</text>

  <text x="70" y="190" fill="#355760" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.8">INTEGRATION LAYER</text>
  <text x="70" y="448" fill="#355760" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.8">INDEXING AND RETRIEVAL</text>
  <text x="920" y="448" fill="#355760" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.8">WORKFLOWS AND DELIVERY</text>

  <g filter="url(#shadow)">
    <rect x="68" y="212" width="440" height="154" rx="24" fill="url(#cardBlue)" stroke="#A9C5F4" stroke-width="2"/>
    <text x="100" y="258" fill="#173C73" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">CS1Client</text>
    <text x="100" y="292" fill="#2E4C79" font-family="Segoe UI, Arial, sans-serif" font-size="20">Company and portfolio facade</text>
    <text x="100" y="326" fill="#40556D" font-family="Segoe UI, Arial, sans-serif" font-size="18">• company lookup by ticker or UUID</text>
    <text x="100" y="352" fill="#40556D" font-family="Segoe UI, Arial, sans-serif" font-size="18">• sector normalization and portfolio context</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="578" y="212" width="440" height="154" rx="24" fill="url(#cardTeal)" stroke="#94D5C3" stroke-width="2"/>
    <text x="610" y="258" fill="#195548" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">CS2Client</text>
    <text x="610" y="292" fill="#2D5E55" font-family="Segoe UI, Arial, sans-serif" font-size="20">Evidence facade over documents and signals</text>
    <text x="610" y="326" fill="#40635B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• source type, confidence, fiscal year metadata</text>
    <text x="610" y="352" fill="#40635B" font-family="Segoe UI, Arial, sans-serif" font-size="18">• indexed state tracked in Redis</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1088" y="212" width="440" height="154" rx="24" fill="url(#cardAmber)" stroke="#E6C481" stroke-width="2"/>
    <text x="1120" y="258" fill="#7A4B0A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">CS3Client</text>
    <text x="1120" y="292" fill="#6D572F" font-family="Segoe UI, Arial, sans-serif" font-size="20">Scoring, confidence intervals, and rubric access</text>
    <text x="1120" y="326" fill="#6B603F" font-family="Segoe UI, Arial, sans-serif" font-size="18">• dimension scores and company assessment</text>
    <text x="1120" y="352" fill="#6B603F" font-family="Segoe UI, Arial, sans-serif" font-size="18">• rubric criteria and keyword thresholds</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="86" y="470" width="340" height="150" rx="24" fill="white" stroke="#CBD8DF" stroke-width="2"/>
    <text x="116" y="512" fill="#29424A" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">DimensionMapper</text>
    <text x="116" y="546" fill="#52666E" font-family="Segoe UI, Arial, sans-serif" font-size="18">Maps signals and source types</text>
    <text x="116" y="572" fill="#52666E" font-family="Segoe UI, Arial, sans-serif" font-size="18">to public CS4 dimensions</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="464" y="470" width="340" height="150" rx="24" fill="url(#cardRose)" stroke="#E3B8C7" stroke-width="2"/>
    <text x="494" y="512" fill="#7C294F" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Indexing Pipeline</text>
    <text x="494" y="546" fill="#775065" font-family="Segoe UI, Arial, sans-serif" font-size="18">`index_evidence.py` plus Airflow DAG</text>
    <text x="494" y="572" fill="#775065" font-family="Segoe UI, Arial, sans-serif" font-size="18">creates Chroma documents and marks indexed evidence</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="86" y="672" width="340" height="158" rx="24" fill="url(#cardSlate)" stroke="#C5D0DA" stroke-width="2"/>
    <text x="116" y="714" fill="#314A54" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">VectorStore</text>
    <text x="116" y="748" fill="#586A73" font-family="Segoe UI, Arial, sans-serif" font-size="18">Persistent local Chroma index</text>
    <text x="116" y="774" fill="#586A73" font-family="Segoe UI, Arial, sans-serif" font-size="18">stored under `CHROMA_PATH`</text>
    <text x="116" y="800" fill="#586A73" font-family="Segoe UI, Arial, sans-serif" font-size="18">and mounted to a Docker volume</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="464" y="672" width="340" height="158" rx="24" fill="url(#cardSlate)" stroke="#C5D0DA" stroke-width="2"/>
    <text x="494" y="714" fill="#314A54" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">HybridRetriever</text>
    <text x="494" y="748" fill="#586A73" font-family="Segoe UI, Arial, sans-serif" font-size="18">Chroma + BM25 + RRF fusion</text>
    <text x="494" y="774" fill="#586A73" font-family="Segoe UI, Arial, sans-serif" font-size="18">HyDE query expansion via LiteLLM</text>
    <text x="494" y="800" fill="#586A73" font-family="Segoe UI, Arial, sans-serif" font-size="18">metadata filters for company, dimension, and source</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="914" y="470" width="286" height="166" rx="24" fill="url(#cardBlue)" stroke="#A9C5F4" stroke-width="2"/>
    <text x="944" y="512" fill="#173C73" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">JustificationGenerator</text>
    <text x="944" y="546" fill="#3A5472" font-family="Segoe UI, Arial, sans-serif" font-size="18">Grounds explanation in rubric-aligned evidence</text>
    <text x="944" y="572" fill="#3A5472" font-family="Segoe UI, Arial, sans-serif" font-size="18">uses CS3 context plus hybrid retrieval</text>
    <text x="944" y="598" fill="#3A5472" font-family="Segoe UI, Arial, sans-serif" font-size="18">LLM summary with deterministic fallback</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1230" y="470" width="286" height="166" rx="24" fill="url(#cardTeal)" stroke="#94D5C3" stroke-width="2"/>
    <text x="1260" y="512" fill="#195548" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">ICPrepWorkflow</text>
    <text x="1260" y="546" fill="#3B655D" font-family="Segoe UI, Arial, sans-serif" font-size="18">Committee packet with strengths, risks,</text>
    <text x="1260" y="572" fill="#3B655D" font-family="Segoe UI, Arial, sans-serif" font-size="18">diligence questions, recommendation,</text>
    <text x="1260" y="598" fill="#3B655D" font-family="Segoe UI, Arial, sans-serif" font-size="18">and evidence strength rollup</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="914" y="680" width="286" height="166" rx="24" fill="url(#cardAmber)" stroke="#E6C481" stroke-width="2"/>
    <text x="944" y="722" fill="#7A4B0A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">AnalystNotesCollector</text>
    <text x="944" y="756" fill="#6B603F" font-family="Segoe UI, Arial, sans-serif" font-size="18">Indexes interviews, DD findings,</text>
    <text x="944" y="782" fill="#6B603F" font-family="Segoe UI, Arial, sans-serif" font-size="18">and data-room summaries into CS4 retrieval</text>
    <text x="944" y="808" fill="#6B603F" font-family="Segoe UI, Arial, sans-serif" font-size="18">while also generating note summaries</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1230" y="680" width="286" height="166" rx="24" fill="url(#cardRose)" stroke="#E3B8C7" stroke-width="2"/>
    <text x="1260" y="722" fill="#7C294F" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Delivery Surfaces</text>
    <text x="1260" y="756" fill="#775065" font-family="Segoe UI, Arial, sans-serif" font-size="18">FastAPI search and justification APIs</text>
    <text x="1260" y="782" fill="#775065" font-family="Segoe UI, Arial, sans-serif" font-size="18">Streamlit exploration and exercise outputs</text>
    <text x="1260" y="808" fill="#775065" font-family="Segoe UI, Arial, sans-serif" font-size="18">Airflow automation and verification scripts</text>
  </g>

  <path d="M288 366V438" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M798 366V438" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1308 366V438" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M426 545H454" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M804 545H882" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M634 620V648" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M256 620V648" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M426 751H454" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M804 751H882" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1058 636V662" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1200 553H1224" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1200 763H1224" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1374 636V662" stroke="#245866" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M1200 530C1265 530 1265 300 1088 300" stroke="#245866" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <path d="M1200 718C1280 718 1280 300 578 300" stroke="#245866" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <path d="M1230 560C1120 560 1120 560 1200 560" opacity="0"/>

  <rect x="60" y="886" width="1480" height="60" rx="18" fill="rgba(19,52,59,0.06)" stroke="#D4E0E2"/>
  <text x="92" y="924" fill="#365760" font-family="Segoe UI, Arial, sans-serif" font-size="18">Persistent stores: Snowflake for structured company, evidence, and scoring data; Redis for cache/index flags; local Chroma volume for vector search; optional S3 for raw and proof artifacts.</text>
</svg>
