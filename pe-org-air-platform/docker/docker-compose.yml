services:
  rag-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pe-rag-api
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CHROMA_PATH: /data/chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data/chroma
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: pe-rag-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  chroma-data:
    name: pe_rag_chroma
  redis-data:
    name: pe_rag_redis
